[tools]
node = "25"
go = "1.26"
golangci-lint = "latest"
dotenv-linter = "latest"
air = "latest"
overmind = "latest"
docker-cli = "latest"
tmux = "latest"

[tasks.setup]
description = "Initial project setup"
run = """
  # ensure .env files exist
  cd backend && [ -f .env ] || cp .env.example .env
  cd backend && [ -d data ] || mkdir data

  # Dependencies
  mise run deps:install

  # Infra Check
  docker info >/dev/null 2>&1 || (echo "❌ Docker is not running!" && exit 1)
  mise run infra:up
"""

[tasks."dev"]
description = "Start development environment with hot reload for backend and frontend"
run = "overmind s"

[tasks."be:dev"]
description = "Start backend in development mode with hot reload"
dir="backend"
run = "exec air"

[tasks."fe:dev"]
description = "Start frontend in development mode with hot reload"
dir="frontend"
run = "exec corepack yarn dev"

[tasks."be:test"]
description = "Run backend tests with coverage"
dir = "backend"
run = """
  mkdir -p cmd/assets &&
  touch cmd/assets/index.html &&
  go test -v -coverprofile=coverage.out ./... &&
  go tool cover -html=coverage.out -o coverage.html
"""

[tasks."fe:test"]
description = "Run frontend tests with coverage"
dir = "frontend"
run = 'NODE_OPTIONS="--no-webstorage" corepack yarn vitest run --coverage'

[tasks."test"]
description = "Run all tests with coverage"
run = "mise run be:test ::: fe:test"

[tasks."infra:up"]
description = "Start infrastructure services"
run = """	
    docker compose up -d --force-recreate --remove-orphans
    echo ""
    echo "🚀 --- INFRASTRUCTURE DASHBOARD ---"
    echo "📧 Mailhog:       http://localhost:8025"
    echo "📊 OpenObserve:   http://localhost:8027 (admin@example.com / password123)"
    echo "🔍 RedisInsight:  http://localhost:8026"
    echo "📈 OTel gRPC:     localhost:4317"
    echo "----------------------------------"
"""

[tasks."infra:down"]
description = "Stop infrastructure services"
run = "docker compose down"

[tasks."infra:restart"]
description = "Restart infrastructure services"
run = """
  mise run infra:down
  mise run infra:up
"""

# ==========================================
# 🔍 LINTING 
# ==========================================

[tasks."be:lint"]
description = "Lint backend code (pass --fix to auto-fix)"
dir = "backend"
usage = """
flag "--fix" help="Automatically fix linting issues"
"""
run = """
  : "🚀 Backend (Auto-Fix: ${usage_fix:-false})"
  mkdir -p cmd/assets
  touch cmd/assets/index.html

  if [ "$usage_fix" = "true" ]; then
    go fmt ./...
    golangci-lint run --fix
    dotenv-linter fix . --no-backup --ignore-checks QuoteCharacter,ValueWithoutQuotes
  
  else
    golangci-lint run
    dotenv-linter check . --ignore-checks QuoteCharacter,ValueWithoutQuotes
  fi
"""

[tasks."fe:lint"]
description = "Lint frontend code (pass --fix to auto-fix)"
dir = "frontend"
usage = """
flag "--fix" help="Automatically fix linting issues"
"""
run = """
  : "🎨 Frontend (Auto-Fix: ${usage_fix:-false})"
  if [ "$usage_fix" = "true" ]; then
    corepack yarn run prettier .. --write
    corepack yarn run eslint --fix
    dotenv-linter fix . --no-backup
    corepack yarn run tsc --noEmit
  else
    corepack yarn run tsc --noEmit
    corepack yarn run eslint
    corepack yarn run prettier .. --check
    dotenv-linter check .
  fi
"""

[tasks.lint]
description = "Lint the whole project (pass --fix to auto-fix)"
usage = """
flag "--fix" help="Automatically fix linting issues"
"""
run = """
  : "🚦 Orchestration (Auto-Fix: ${usage_fix:-false})"
  if [ "$usage_fix" = "true" ]; then
    mise run be:lint --fix ::: fe:lint --fix
  else
    mise run be:lint ::: fe:lint
  fi
"""