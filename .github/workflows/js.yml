name: javascript
on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  type-check: # Neuer Job: Der Türsteher für deine Typen
    name: type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: |
          corepack enable
          yarn set version stable
        working-directory: frontend
      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: install
        run: yarn install --immutable
        working-directory: frontend
      - name: Run Type Check
        run: yarn run tsc --noEmit
        working-directory: frontend

  linter:
    name: linter
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: |
          corepack enable
          yarn set version stable
        working-directory: frontend
      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: install
        run: yarn install --immutable
        working-directory: frontend
      - name: prettier
        run: yarn run prettier .. --check
        working-directory: frontend
      - name: eslint
        run: yarn run eslint
        working-directory: frontend

  test:
    name: unit tests
    runs-on: ubuntu-latest
    needs: linter
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: |
          corepack enable
          yarn set version stable
        working-directory: frontend

      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: install
        run: yarn install --immutable
        working-directory: frontend

      - name: build
        run: yarn run build
        working-directory: frontend

      - name: test
        run: corepack yarn vitest run --coverage
        working-directory: frontend
        env:
          NODE_OPTIONS: --no-webstorage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: frontend/coverage

      - name: Upload JS coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
