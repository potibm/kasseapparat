name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  # ==========================================
  # 1. GOLANG BACKEND
  # ==========================================
  go-linter:
    name: Go Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create assets file
        run: mkdir -p backend/cmd/assets && touch backend/cmd/assets/index.html
      - uses: actions/setup-go@v6
        with:
          cache-dependency-path: backend/go.sum
          go-version-file: backend/go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4.0
          working-directory: ./backend
          args: --timeout=30m --config=.golangci.yaml

  go-test:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    needs: go-linter # wait for go linter to pass first
    steps:
      - uses: actions/checkout@v6
      - name: Create assets file
        run: mkdir -p backend/cmd/assets && touch backend/cmd/assets/index.html
      - uses: actions/setup-go@v6
        with:
          cache-dependency-path: backend/go.sum
          go-version-file: backend/go.mod
          cache: true
      - name: Install dependencies
        run: go mod download
        working-directory: backend
      - name: Build
        run: go build -v ./cmd/main.go && go build -v ./tools/main.go
        working-directory: backend
      - name: Test
        run: go test -coverprofile=coverage.out ./...
        working-directory: backend

  # ==========================================
  # 2. JAVASCRIPT FRONTEND
  # ==========================================
  js-type-check:
    name: JS Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: corepack enable && yarn set version stable
        working-directory: frontend
      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: install
        run: yarn install --immutable
        working-directory: frontend
      - name: Run Type Check
        run: yarn run tsc --noEmit
        working-directory: frontend

  js-test:
    name: JS Unit Tests
    runs-on: ubuntu-latest
    needs: js-type-check # wait for type check to pass first
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: corepack enable && yarn set version stable
        working-directory: frontend
      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: install
        run: yarn install --immutable
        working-directory: frontend
      - name: test
        run: corepack yarn vitest run --coverage
        working-directory: frontend
        env:
          NODE_OPTIONS: --no-webstorage

  # ==========================================
  # 3. END TO END (PLAYWRIGHT)
  # ==========================================
  e2e-test:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [go-test, js-test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          cache-dependency-path: backend/go.sum
          go-version-file: backend/go.mod
          cache: true

      - name: Enable Corepack
        run: corepack enable && yarn set version stable
        working-directory: frontend
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install Frontend Dependencies
        run: yarn install --immutable
        working-directory: frontend

      - name: Install Playwright Browsers
        run: yarn dlx playwright install --with-deps
        working-directory: frontend

      - name: Create Test Database
        run: make e2e-setup

      - name: Run Playwright
        run: corepack yarn playwright test
        working-directory: frontend

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # ==========================================
  # 4. DOCKER BUILD CHECK
  # ==========================================
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [go-test, js-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate build version
        id: buildversion
        run: echo "value=0.0.$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Generate build date
        id: builddate
        run: echo "value=$(date --iso-8601=seconds)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (without pushing)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: my-temp-image:latest
          build-args: |
            VERSION=${{ steps.buildversion.outputs.value }}
            BUILD_DATE=${{ steps.builddate.outputs.value }}
