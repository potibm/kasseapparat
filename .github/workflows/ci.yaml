name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:

permissions: {}

jobs:
  # ==========================================
  # 1. LINTING
  # ==========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true

      - name: Install dependencies
        run: mise run deps:install

      - name: Run Linters (Go, TS, Prettier, Dotenv)
        run: mise run lint

  # ==========================================
  # 2. UNIT TESTS
  # ==========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true

      - name: Install dependencies
        run: mise run deps:install

      - name: Run all tests
        run: mise run test

      - name: Upload Go Coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-coverage
          path: backend/coverage.out
          retention-days: 3

      - name: Upload TS Coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ts-coverage
          path: frontend/coverage/
          retention-days: 3

  # ==========================================
  # 3. END TO END (PLAYWRIGHT)
  # ==========================================
  e2e-test:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true

      - name: Install dependencies
        run: mise run deps:install

      - name: Create .env file
        run: cp .env.example .env
        working-directory: backend

      - name: Install Playwright OS Dependencies
        working-directory: frontend
        run: npx playwright install-deps

      - name: Run E2E Tests
        run: mise run e2e:run

      - name: Upload Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 3

  # ==========================================
  # 4. DOCKER BUILD CHECK
  # ==========================================
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true

      - name: Build Docker image
        run: mise run docker:build

  # ==========================================
  # 5. SONARQUBE ANALYSIS
  # ==========================================
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download Go Coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-coverage
          path: backend/

      - name: Download TS Coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ts-coverage
          path: frontend/coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
